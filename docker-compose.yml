version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: authentik-login-designer-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:casmarts_secure_db_pwd_2026@db-primary:5432/authentik_login_manager
      VALKEY_URL: redis://cache:6379/1
      CORS_ORIGINS: http://localhost:3000,https://auth.casmart.internal,https://logindesigner.casmart.internal,http://localhost:80
      ADMIN_API_KEY: casmarts_admin_super_secret_key_123
      PUBLIC_API_BASE_URL: https://auth.casmart.internal
    ports:
      - "8000:8000"
    restart: always
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - identity-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: authentik-login-designer-frontend
    ports:
      - "3000:80"
    restart: always
    networks:
      - identity-network

networks:
  identity-network:
    name: identity-network
    external: true
