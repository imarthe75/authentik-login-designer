<div class="relative">
  <!-- Selector Button -->
  <button (click)="toggleOpen()"
          class="flex items-center gap-2 px-4 py-2 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
    <span class="text-sm font-medium text-gray-900">{{ currentTheme.display_name }}</span>
    <lucide-icon name="chevron-down" class="w-4 h-4 text-gray-500"></lucide-icon>
  </button>

  <!-- Dropdown Menu -->
  @if (isOpen()) {
    <div class="absolute top-full left-0 mt-2 w-64 bg-white border border-gray-200 rounded-lg shadow-lg z-50 max-h-96 overflow-y-auto">
      @for (theme of themes; track theme.authentik_flow_slug) {
        <button (click)="handleSelectTheme(theme.authentik_flow_slug)"
                [class.bg-blue-50]="theme.authentik_flow_slug === currentSlug"
                [class.border-l-4]="theme.authentik_flow_slug === currentSlug"
                [class.border-blue-500]="theme.authentik_flow_slug === currentSlug"
                class="w-full text-left px-4 py-3 hover:bg-gray-50 transition-colors border-l-4 border-transparent flex items-center gap-2">
          @if (theme.authentik_flow_slug === currentSlug) {
            <lucide-icon name="check" class="w-4 h-4 text-blue-600"></lucide-icon>
          }
          <div class="flex-1">
            <p class="text-sm font-medium text-gray-900">{{ theme.display_name }}</p>
            <p class="text-xs text-gray-500">{{ theme.authentik_flow_slug }}</p>
          </div>
        </button>
      }

      <div class="border-t border-gray-200 px-4 py-2">
        <button (click)="openModal()"
                class="w-full flex items-center gap-2 px-3 py-2 text-sm text-blue-600 hover:bg-blue-50 rounded transition-colors">
          <lucide-icon name="plus" class="w-4 h-4"></lucide-icon>
          Crear nuevo tema
        </button>
      </div>
    </div>
  }

  <!-- Create Modal -->
  @if (showModal()) {
    <div class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
      <div class="bg-white rounded-lg shadow-2xl max-w-md w-full p-6 animate-scaleUp">
        <h2 class="text-lg font-bold mb-4 text-gray-900">Crear nuevo tema</h2>

        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nombre del tema</label>
            <input type="text"
                   [value]="newDisplayName()"
                   (input)="newDisplayName.set($any($event.target).value)"
                   placeholder="Ej: Portal Ejemplo"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Identificador del flujo</label>
            <input type="text"
                   [value]="newFlowSlug()"
                   (input)="handleSlugChange($any($event.target).value)"
                   placeholder="ejemplo-flow"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
            @if (slugError()) {
              <p class="text-xs text-red-600 mt-1">{{ slugError() }}</p>
            }
          </div>
        </div>

        <div class="flex gap-3 mt-6">
          <button (click)="showModal.set(false)"
                  class="flex-1 px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors">
            Cancelar
          </button>
          <button (click)="handleSubmit()"
                  [disabled]="!newDisplayName().trim() || !newFlowSlug().trim()"
                  class="flex-1 px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 disabled:opacity-50 transition-colors">
            Crear
          </button>
        </div>
      </div>
    </div>
  }
</div>
