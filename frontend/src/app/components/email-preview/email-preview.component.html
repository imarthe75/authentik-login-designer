<div class="flex flex-col h-full border border-gray-200 rounded-xl overflow-hidden bg-white">
  <!-- Inbox simulation strip -->
  <div class="shrink-0 bg-gray-50 border-b border-gray-200 px-4 py-2.5 flex items-center gap-3">
    <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 font-bold text-xs shrink-0">
      NO
    </div>
    <div class="min-w-0">
      <p class="text-xs font-semibold text-gray-800 truncate">noreply@casmarts.internal</p>
      <p class="text-sm font-medium text-gray-900 truncate">
        {{ loading() ? 'Cargando…' : (subject() || EMAIL_EVENT_LABELS[eventType]) }}
      </p>
    </div>
    <button
      type="button"
      (click)="loadPreview()"
      [disabled]="loading()"
      class="ml-auto shrink-0 text-xs text-gray-500 hover:text-blue-600 border border-gray-300 hover:border-blue-400 rounded px-2 py-1 transition-colors disabled:opacity-40"
      title="Recargar vista previa"
    >
      ↻ Actualizar
    </button>
  </div>

  <!-- iframe body -->
  <div class="flex-1 relative min-h-0">
    @if (loading()) {
      <div class="absolute inset-0 flex items-center justify-center bg-white/80 z-10">
        <div class="text-sm text-gray-500">Cargando vista previa…</div>
      </div>
    }
    @if (error()) {
      <div class="absolute inset-0 flex items-center justify-center p-6 z-10 bg-white">
        <p class="text-sm text-red-600 text-center">{{ error() }}</p>
      </div>
    }
    <iframe
      #iframe
      [title]="'Vista previa: ' + EMAIL_EVENT_LABELS[eventType]"
      sandbox="allow-same-origin"
      class="w-full h-full border-0"
      style="min-height: 400px;"
    ></iframe>
  </div>
</div>
