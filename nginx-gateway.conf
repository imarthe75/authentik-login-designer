# Nginx Gateway Config for auth.casmart.internal
# Place in: /etc/nginx/sites-available/auth.casmart.internal
# Then: sudo ln -s /etc/nginx/sites-available/auth.casmart.internal /etc/nginx/sites-enabled/
# Finally: sudo nginx -t && sudo systemctl reload nginx

upstream authentik_login_designer_backend {
    server localhost:8000;
    keepalive 32;
}

upstream authentik_login_designer_frontend {
    server localhost:3000;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name auth.casmart.internal;

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name auth.casmart.internal;

    # SSL Certificate paths
    # If using self-signed for testing:
    # sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
    #   -keyout /etc/ssl/private/identity.key \
    #   -out /etc/ssl/certs/identity.crt
    ssl_certificate /etc/ssl/certs/identity.crt;
    ssl_certificate_key /etc/ssl/private/identity.key;

    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logging
    access_log /var/log/nginx/identity-casmart-access.log combined buffer=32k flush=5s;
    error_log /var/log/nginx/identity-casmart-error.log warn;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml+rss
               application/javascript application/json;

    # Frontend (Angular)
    location / {
        proxy_pass http://authentik_login_designer_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_http_version 1.1;

        # SPA: try_files handled by Nginx in frontend container
        # but we can add fallback here if needed
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Backend API
    location /api/ {
        proxy_pass http://authentik_login_designer_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_http_version 1.1;

        # API timeouts (longer for file uploads)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering for uploads
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 8k;
        proxy_busy_buffers_size 32k;

        # Large file uploads
        client_max_body_size 100M;
    }

    # Health check endpoint (no auth required)
    location /health {
        access_log off;
        proxy_pass http://authentik_login_designer_backend/health;
        proxy_set_header Host $host;
    }

    # Static assets caching (Angular dist files)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://authentik_login_designer_frontend;
        proxy_cache_valid 200 30d;
        proxy_cache_bypass $http_pragma $http_authorization;
        add_header Cache-Control "public, immutable, max-age=31536000";
        access_log off;
    }

    # Deny access to common files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
